<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RuneLuck Casino</title>
<style>

*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;overflow-x:hidden;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden;color:#c8e0d0}

/* ANIMATIONS */
@keyframes btnP{0%,100%{box-shadow:0 0 14px rgba(34,197,94,0.3)}50%{box-shadow:0 0 30px rgba(34,197,94,0.5)}}
@keyframes jpG{0%,100%{text-shadow:0 0 6px rgba(240,201,77,0.3)}50%{text-shadow:0 0 18px rgba(240,201,77,0.7)}}
@keyframes stopB{0%{transform:translateY(7px)}50%{transform:translateY(-4px)}100%{transform:translateY(0)}}
@keyframes coinF{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(200px) rotate(720deg)}}
@keyframes shk{0%,100%{transform:translate(0)}10%{transform:translate(-6px,3px)}20%{transform:translate(6px,-3px)}30%{transform:translate(-5px,2px)}40%{transform:translate(5px,-2px)}50%{transform:translate(-3px,1px)}60%{transform:translate(3px,-1px)}}
@keyframes shk2{0%,100%{transform:translate(0)}10%{transform:translate(-10px,5px)}20%{transform:translate(10px,-5px)}30%{transform:translate(-8px,4px)}40%{transform:translate(8px,-3px)}50%{transform:translate(-5px,2px)}}
@keyframes fl{0%{opacity:0}40%{opacity:1}100%{opacity:0}}
@keyframes fl2{0%{opacity:0}30%{opacity:1}60%{opacity:0.8}100%{opacity:0}}
@keyframes bgGlow{0%,100%{opacity:0.3}50%{opacity:0.4}}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:1}90%{opacity:0.8}100%{transform:translateY(-400px) scale(0.3);opacity:0}}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}25%{transform:translate(30px,-20px)}50%{transform:translate(-10px,-35px)}75%{transform:translate(-25px,-10px)}}
@keyframes shimmer{0%{transform:translateX(-100%) rotate(25deg)}100%{transform:translateX(200%) rotate(25deg)}}
@keyframes respinGlow{0%,100%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 25px rgba(240,201,77,0.4),inset 0 0 15px rgba(240,201,77,0.1)}}
@keyframes popX{0%{transform:scale(1);opacity:1}30%{transform:scale(1.5);filter:brightness(2)}100%{transform:scale(0) rotate(180deg);opacity:0}}
@keyframes dropBnc{0%{transform:translateY(-110px);opacity:0}60%{transform:translateY(6px);opacity:1}80%{transform:translateY(-3px)}100%{transform:translateY(0)}}
@keyframes multiBnc{0%{transform:scale(0)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes chatMsg{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
@keyframes winAnnounce{0%{opacity:0;transform:scale(0.8)}50%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}

/* WIN POP-OUT ANIMATIONS */
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:0;filter:blur(12px)}30%{filter:blur(0)}50%{transform:translate(-50%,-50%) scale(1.15) rotate(2deg);opacity:1}70%{transform:translate(-50%,-50%) scale(0.95) rotate(-1deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1}}
@keyframes popFloat{0%,100%{transform:translate(-50%,-50%) scale(1) translateY(0)}50%{transform:translate(-50%,-50%) scale(1.03) translateY(-5px)}}
@keyframes popOut{0%{transform:translate(-50%,-50%) scale(1);opacity:1;filter:blur(0)}100%{transform:translate(-50%,-50%) scale(2);opacity:0;filter:blur(8px)}}
@keyframes letterDrop{0%{transform:translateY(-30px) scale(0) rotate(-20deg);opacity:0}60%{transform:translateY(3px) scale(1.1) rotate(2deg);opacity:1}100%{transform:translateY(0) scale(1) rotate(0)}}
@keyframes amtCount{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes starBurst{0%{transform:translate(-50%,-50%) scale(0);opacity:0.6}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
@keyframes ringPulse{0%{transform:translate(-50%,-50%) scale(0.3);opacity:0.8;border-width:4px}100%{transform:translate(-50%,-50%) scale(3);opacity:0;border-width:1px}}
@keyframes sparkFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{opacity:0}}
@keyframes winStripe{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

/* PER-SYMBOL GLOW */
@keyframes gwGreen{0%,100%{filter:brightness(1.15) drop-shadow(0 0 10px rgba(34,220,94,0.5)) drop-shadow(0 0 24px rgba(34,220,94,0.25))}50%{filter:brightness(1.35) drop-shadow(0 0 18px rgba(34,220,94,0.8)) drop-shadow(0 0 40px rgba(34,220,94,0.35))}}
@keyframes gwRed{0%,100%{filter:brightness(1.15) drop-shadow(0 0 10px rgba(255,50,50,0.5)) drop-shadow(0 0 24px rgba(255,50,50,0.25))}50%{filter:brightness(1.35) drop-shadow(0 0 18px rgba(255,50,50,0.8)) drop-shadow(0 0 40px rgba(255,50,50,0.35))}}
@keyframes gwBlue{0%,100%{filter:brightness(1.2) drop-shadow(0 0 12px rgba(0,180,255,0.55)) drop-shadow(0 0 26px rgba(0,160,255,0.3))}50%{filter:brightness(1.4) drop-shadow(0 0 20px rgba(0,180,255,0.85)) drop-shadow(0 0 44px rgba(0,160,255,0.45))}}
@keyframes gwGold{0%,100%{filter:brightness(1.15) drop-shadow(0 0 10px rgba(255,200,40,0.5)) drop-shadow(0 0 24px rgba(255,180,20,0.25))}50%{filter:brightness(1.35) drop-shadow(0 0 18px rgba(255,200,40,0.8)) drop-shadow(0 0 40px rgba(255,180,20,0.35))}}
@keyframes gwPurple{0%,100%{filter:brightness(1.15) drop-shadow(0 0 10px rgba(180,60,255,0.5)) drop-shadow(0 0 24px rgba(180,60,255,0.25))}50%{filter:brightness(1.35) drop-shadow(0 0 18px rgba(180,60,255,0.8)) drop-shadow(0 0 40px rgba(180,60,255,0.35))}}
@keyframes gwOrange{0%,100%{filter:brightness(1.15) drop-shadow(0 0 10px rgba(255,120,20,0.5)) drop-shadow(0 0 24px rgba(255,100,0,0.25))}50%{filter:brightness(1.35) drop-shadow(0 0 18px rgba(255,120,20,0.8)) drop-shadow(0 0 40px rgba(255,100,0,0.35))}}
@keyframes wGlow{0%,100%{filter:brightness(1.2) drop-shadow(0 0 8px rgba(255,200,0,0.4))}50%{filter:brightness(2) drop-shadow(0 0 28px rgba(255,200,0,0.8)) drop-shadow(0 0 50px rgba(255,200,0,0.3))}}
.g-clover img{animation:gwGreen 3s ease infinite!important}.g-seven img{animation:gwOrange 3s ease infinite!important}
.g-cherry img{animation:gwRed 3s ease infinite!important}.g-strawberry img{animation:gwRed 3s ease infinite!important}
.g-watermelon img{animation:gwRed 3s ease infinite!important}.g-diamond img{animation:gwBlue 3s ease infinite!important}
.g-crown img{animation:gwGold 3s ease infinite!important}.g-bar img{animation:gwGold 3s ease infinite!important}
.g-triple7 img{animation:gwGold 3s ease infinite!important}.g-lemon img{animation:gwGold 3s ease infinite!important}
.g-grapes img{animation:gwPurple 3s ease infinite!important}

/* LOBBY */
.lobby{min-height:100vh;padding:30px 20px;display:none;flex-direction:column;align-items:center;background:transparent}.lobby.show{display:flex}
.lobby-title{font-size:42px;font-weight:900;text-align:center;margin-bottom:4px}.lobby-title b{color:#e0f0e4}.lobby-title i{color:#4ade80;font-style:normal;text-shadow:0 0 20px rgba(34,197,94,0.5)}
.lobby-sub{color:#3a6a4a;font-size:14px;margin-bottom:30px}
.lobby-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:900px;width:100%}
.slot-card{border-radius:16px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;border:2px solid rgba(201,168,76,0.15);aspect-ratio:9/16;background:#050203}
.slot-card:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(0,0,0,0.5);border-color:rgba(201,168,76,0.4)}
.card-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;background-color:#050203}
.card-overlay{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;justify-content:flex-end;background:linear-gradient(180deg,transparent 60%,rgba(5,2,3,0.75) 88%,rgba(5,2,3,0.95) 100%);padding:12px}
.card-badge{position:absolute;top:12px;right:12px;z-index:2;font-size:9px;font-weight:800;padding:3px 10px;border-radius:5px;letter-spacing:1px;backdrop-filter:blur(4px)}
.badge-hot{background:rgba(255,60,60,0.3);color:#ff8888;border:1px solid rgba(255,60,60,0.3)}.badge-new{background:rgba(34,197,94,0.3);color:#4ade80;border:1px solid rgba(34,197,94,0.3)}.badge-vip{background:rgba(240,201,77,0.3);color:#f0c94d;border:1px solid rgba(240,201,77,0.3)}
.card-desc{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.4;margin-bottom:6px}
.card-feat{font-size:10px;color:#c084fc;font-weight:700;margin-bottom:10px;letter-spacing:0.5px}
.card-stats{display:flex;gap:10px;font-size:10px;color:rgba(255,255,255,0.35);margin-bottom:12px}.card-stats em{color:#4ade80;font-style:normal;font-weight:700}
.card-play{width:100%;padding:12px;border-radius:10px;border:2px solid rgba(201,168,76,0.3);background:rgba(201,168,76,0.08);color:#f0d078;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.2s;letter-spacing:1px;backdrop-filter:blur(4px)}.card-play:hover{background:rgba(201,168,76,0.2);border-color:rgba(201,168,76,0.5)}

/* GAME LAYOUT */
.game-wrap{display:none;height:100vh;overflow:hidden}.game-wrap.show{display:flex}
.game-main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.game-top{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:rgba(3,8,5,0.9);border-bottom:1px solid rgba(34,197,94,0.06);min-height:40px}
.game-top .ttl{font-size:18px;font-weight:900}.game-top .ttl b{color:#e0f0e4}.game-top .ttl i{color:#4ade80;font-style:normal}
.back-btn{background:none;border:1px solid rgba(34,197,94,0.12);color:#4a8a5a;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600}.back-btn:hover{border-color:#22c55e;color:#4ade80}
.game-slot{flex:1;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}

/* SLOT MACHINE */
.S{max-width:820px;margin:0 auto;width:100%;margin:0 auto;position:relative}
.bg-img{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;animation:bgGlow 6s ease infinite}
.bg-ov{position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(180deg,rgba(3,8,5,0.7) 0%,rgba(3,8,5,0.25) 25%,rgba(3,8,5,0.3) 50%,rgba(3,8,5,0.25) 75%,rgba(3,8,5,0.82) 100%)}
.particles{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}.part{position:absolute;border-radius:50%;animation:floatUp linear infinite;opacity:0}
.part.gold{background:radial-gradient(circle,#f0c94d,rgba(240,201,77,0))}.part.green{background:radial-gradient(circle,#4ade80,rgba(34,197,94,0))}
.orb{position:absolute;border-radius:50%;filter:blur(30px);pointer-events:none;z-index:0;animation:orbFloat 12s ease infinite}
.o1{width:100px;height:100px;background:rgba(34,197,94,0.05);top:10%;left:15%}.o2{width:80px;height:80px;background:rgba(240,201,77,0.03);top:40%;right:10%;animation-delay:4s}
.shimmer-l{position:absolute;top:0;left:0;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(34,197,94,0.02),transparent);z-index:1;pointer-events:none;animation:shimmer 8s ease infinite}
.Z{position:relative;z-index:2}
.hdr{text-align:center;padding:10px 14px 6px}
.jps{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.1);border-radius:8px;padding:3px 12px;backdrop-filter:blur(8px)}.jps small{font-size:8px;letter-spacing:2px;color:#22c55e;font-weight:700}.jps strong{font-family:'Courier New',monospace;font-size:15px;color:#f0c94d;animation:jpG 3s ease infinite}
.mode-tag{display:inline-block;margin-top:4px;font-size:10px;padding:2px 10px;border-radius:4px;font-weight:700;letter-spacing:0.5px}
.mode-classic{background:rgba(255,60,60,0.1);color:#ff6666}.mode-respin{background:rgba(240,201,77,0.1);color:#f0c94d}.mode-cascade{background:rgba(34,197,94,0.1);color:#4ade80}
.mac{margin:0 14px;position:relative}.mac.shk{animation:shk 0.6s ease}.mac.shk2{animation:shk2 0.8s ease}
.frame{border-radius:12px;padding:2px;background:linear-gradient(135deg,rgba(34,197,94,0.15),rgba(34,197,94,0.03),rgba(212,168,67,0.08),rgba(34,197,94,0.03),rgba(34,197,94,0.15))}
.fi{background:rgba(3,8,5,0.88);border-radius:10px;overflow:hidden;position:relative;backdrop-filter:blur(6px)}
.rw{display:flex;height:460px}.rl{flex:1;overflow:hidden;position:relative}.rl+.rl{border-left:1px solid rgba(34,197,94,0.06)}
.rl::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(3,8,5,0.97) 0%,transparent 14%,transparent 86%,rgba(3,8,5,0.97) 100%);z-index:2;pointer-events:none}
.rl.stop{animation:stopB 0.3s ease}.rl.wglow .wsym img{animation:wGlow 0.5s ease 5!important}.rl.respin-glow{animation:respinGlow 0.5s ease 3}
.strip{display:flex;flex-direction:column;will-change:transform}
.sym{height:154px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:3px}
.sym img{width:130px;height:130px;object-fit:contain;transition:all 0.2s}
.plm{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:156px;z-index:3;pointer-events:none;border-top:2px solid rgba(34,197,94,0.1);border-bottom:2px solid rgba(34,197,94,0.1)}
.pla{position:absolute;top:50%;transform:translateY(-50%);z-index:4}.pla.l{left:-1px}.pla.r{right:-1px}.pla svg{width:12px;height:18px}

/* WIN OVERLAY - SPECTACULAR */
.ofl{position:absolute;inset:0;pointer-events:none;z-index:9;opacity:0;border-radius:10px}.ofl.on{animation:fl 0.4s ease}.ofl.on2{animation:fl2 0.6s ease}
.ofg{background:radial-gradient(circle,rgba(34,197,94,0.2),transparent)}.ofd{background:radial-gradient(circle,rgba(240,201,77,0.25),transparent)}.ofm{background:radial-gradient(circle,rgba(192,132,252,0.15),rgba(240,201,77,0.1),transparent)}
.won{position:absolute;top:50%;left:50%;z-index:25;pointer-events:none;text-align:center;display:none;white-space:nowrap}
.won.show{display:block;animation:popIn 0.8s cubic-bezier(0.34,1.56,0.64,1)}
.won.float{animation:popFloat 1.5s ease infinite}
.won.out{animation:popOut 0.6s ease forwards}
.won-letters{display:flex;justify-content:center;gap:2px}
.won-letter{font-weight:900;letter-spacing:3px;display:inline-block;animation:letterDrop 0.4s ease both;-webkit-text-stroke:1.5px rgba(0,0,0,0.3)}
.won.nice .won-letter{font-size:38px;color:#4ade80;text-shadow:0 0 12px #22c55e,0 0 30px #22c55e,0 0 60px rgba(34,197,94,0.4)}
.won.bigw .won-letter{font-size:50px;color:#f0c94d;text-shadow:0 0 16px #f0c94d,0 0 40px #d4a843,0 0 80px rgba(240,201,77,0.4)}
.won.mega .won-letter{font-size:60px;background:linear-gradient(135deg,#f0c94d,#ff6b6b,#c084fc,#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(240,201,77,0.6))}
.won-a{font-family:'Courier New',monospace;font-weight:900;color:#fff;margin-top:6px;animation:amtCount 0.5s ease 0.5s both}
.won.nice .won-a{font-size:24px;text-shadow:0 0 10px rgba(255,255,255,0.3)}.won.bigw .won-a{font-size:32px;text-shadow:0 0 14px rgba(255,255,255,0.4)}.won.mega .won-a{font-size:40px;text-shadow:0 0 18px rgba(255,255,255,0.5)}
.won-s{font-size:13px;color:#c084fc;margin-top:3px;font-weight:700;animation:amtCount 0.4s ease 0.7s both}
.star-burst{position:absolute;top:50%;left:50%;width:80px;height:80px;border-radius:50%;pointer-events:none;z-index:24;display:none}
.star-burst.go{display:block;animation:starBurst 1s ease forwards}
.star-burst.green{background:radial-gradient(circle,rgba(34,197,94,0.4),transparent 60%)}
.star-burst.gold{background:radial-gradient(circle,rgba(240,201,77,0.4),transparent 60%)}
.star-burst.rainbow{background:radial-gradient(circle,rgba(240,201,77,0.3),rgba(192,132,252,0.2),rgba(34,197,94,0.2),transparent 60%)}
.win-ring{position:absolute;top:50%;left:50%;width:60px;height:60px;border-radius:50%;border:3px solid;pointer-events:none;z-index:24;display:none}
.win-ring.go{display:block;animation:ringPulse 0.8s ease forwards}
.win-stripe{position:absolute;top:0;left:0;width:30%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);z-index:24;pointer-events:none;display:none}
.win-stripe.go{display:block;animation:winStripe 0.8s ease}
.multi-badge{position:absolute;top:8px;right:8px;z-index:8;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.25);color:#c084fc;font-size:14px;font-weight:900;padding:4px 12px;border-radius:8px;display:none;font-family:'Courier New',monospace}.multi-badge.show{display:block;animation:multiBnc 0.3s ease}
.cns{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:20}.cn{position:absolute;animation:coinF 1.5s ease-in forwards}
.msg{text-align:center;font-size:12px;font-weight:700;min-height:20px;padding:6px 10px 0;color:#4ade80;text-shadow:0 0 6px rgba(34,197,94,0.15)}.msg.dim{color:#2a5a3a;font-weight:400;text-shadow:none}

/* CONTROLS */
.bt{display:grid;grid-template-columns:1fr 1fr auto 1fr 1fr;gap:5px;padding:5px 10px 8px;align-items:center}
.bx{background:rgba(3,8,5,0.7);border-radius:8px;padding:7px 5px;text-align:center;border:1px solid rgba(34,197,94,0.04);transition:all 0.4s}.bx.hl{border-color:rgba(34,197,94,0.2)}
.lb{font-size:7px;letter-spacing:1.5px;color:#3a6a4a;font-weight:700}.vl{font-family:'Courier New',monospace;font-size:16px;font-weight:900;color:#c8e0d0;margin-top:1px}.gd{color:#f0c94d}.gr{color:#4ade80}
.bc{display:flex;gap:3px;margin-top:3px;justify-content:center}.bb{width:26px;height:20px;border-radius:4px;border:1px solid rgba(34,197,94,0.08);background:rgba(34,197,94,0.03);color:#4a8a5a;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}.bb:hover{color:#4ade80}
.xb{font-size:8px;font-weight:800;color:#22c55e;border:1px solid rgba(34,197,94,0.12);border-radius:4px;padding:2px 7px;cursor:pointer;margin-top:2px;background:none}
.sc{display:flex;align-items:center;padding:0 5px}
.sp{width:76px;height:76px;border-radius:50%;border:3px solid #22c55e;background:radial-gradient(circle at 35% 35%,#4ade80,#16a34a,#095c2a);color:#fff;font-size:13px;font-weight:900;cursor:pointer;text-shadow:0 2px 4px rgba(0,0,0,0.6);animation:btnP 2s ease infinite;transition:all 0.15s}.sp:hover{transform:scale(1.07)}.sp:active{transform:scale(0.93)}.sp:disabled{opacity:0.2;cursor:not-allowed;transform:none;animation:none}

/* CHAT */
.chat-panel{display:none !important}
.chat-hdr{padding:8px 12px;border-bottom:1px solid rgba(34,197,94,0.12);display:flex;align-items:center;gap:6px;background:rgba(3,8,5,0.6)}.chat-hdr .dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px rgba(34,197,94,0.4)}.chat-hdr span{font-size:14px;font-weight:700;color:#4a8a5a}.chat-hdr em{font-size:10px;color:#3a5a4a;font-style:normal;margin-left:auto}
.chat-msgs{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px}.chat-msgs::-webkit-scrollbar{width:3px}.chat-msgs::-webkit-scrollbar-thumb{background:rgba(34,197,94,0.1);border-radius:2px}
.cmsg{animation:chatMsg 0.3s ease;font-size:13px;line-height:1.3;padding:5px 8px;border-radius:6px}.cmsg.user{background:rgba(34,197,94,0.04)}.cmsg .cname{font-weight:700;margin-right:3px}
.cmsg.win-announce{background:rgba(240,201,77,0.06);border:1px solid rgba(240,201,77,0.08);animation:winAnnounce 0.4s ease}.cmsg.win-announce .cname{color:#f0c94d}
.cmsg.sys{color:#3a5a4a;font-size:10px;text-align:center;font-style:italic}

/* PROVABLY FAIR STOP GENERATION */
async function getStops(){
var stops=[];
try{
var seed=fairHash+':'+spn+':'+Date.now();
var enc=new TextEncoder().encode(seed);
var hash=await crypto.subtle.digest('SHA-256',enc);
var arr=new Uint8Array(hash);
for(var c=0;c<RC;c++){stops.push(arr[c]%SL);}
}catch(e){
for(var c=0;c<RC;c++){stops.push(Math.floor(Math.random()*SL));}
}
return stops;
}

/* GET VISIBLE 5x3 GRID after reels stop */
function getGrid(stops){
var g=[];
for(var r=0;r<ROWS;r++){var row=[];for(var c=0;c<RC;c++){row.push(rD[c][(stops[c]+r)%SL]);}g.push(row);}
return g;
}

/* CHECK PAYLINE WINS with wild substitution */
function checkPaylineWin(grid,pl,wildK){
var firstSym=null;
for(var c=0;c<RC;c++){
var s=grid[pl[c]][c];
if(s.type==='scatter')return{cnt:0,sym:null,positions:[]};
if(s.k===wildK)continue;
if(!firstSym){firstSym=s;}
else if(s.k!==firstSym.k)break;
}
if(!firstSym){firstSym=grid[pl[0]][0];} // all wilds
var cnt=0;var positions=[];
for(var c=0;c<RC;c++){
var s=grid[pl[c]][c];
if(s.k===firstSym.k||s.k===wildK){cnt++;positions.push({r:pl[c],c:c});}
else break;
}
return{cnt:cnt,sym:firstSym,positions:positions};
}

/* COUNT SCATTERS */
function countScatters(grid,scatterK){
if(!scatterK)return{cnt:0,positions:[]};
var cnt=0,pos=[];
for(var r=0;r<ROWS;r++)for(var c=0;c<RC;c++){
if(grid[r][c].k===scatterK){cnt++;pos.push({r:r,c:c});}
}
return{cnt:cnt,positions:pos};
}

/* CALCULATE ALL WINS */
function calcWins(grid,variant){
var results=[];var totalWin=0;var allPos={};
var lines=PAYLINES.slice(0,variant.lines);
for(var li=0;li<lines.length;li++){
var w=checkPaylineWin(grid,lines[li],variant.wildK);
if(w.cnt>=3&&w.sym){
var payout=w.sym.p[w.cnt-1]||0;
if(payout>0){
var win=Math.floor(bet*payout);
totalWin+=win;
results.push({line:li,cnt:w.cnt,sym:w.sym,win:win,positions:w.positions});
for(var p=0;p<w.positions.length;p++){allPos[w.positions[p].r+'_'+w.positions[p].c]=true;}
}
}
}
var sc=countScatters(grid,variant.scatterK);
return{results:results,totalWin:totalWin,allPos:allPos,scatters:sc};
}

addChat('sys','',v.lines+' paylines \u2022 '+v.syms.find(function(s){return s.type==='wild'}).label+' = '+v.wildK.toUpperCase());
simChat();}
on('backBtn','click',function(){el('gameWrap').classList.remove('show');el('lobby').classList.add('show');});

/* PAYTABLE */
on('ptBtn','click',function(){el('paytable').classList.toggle('show');});
on('ptClose','click',function(){el('paytable').classList.remove('show');});
function buildPaytable(){
var html='<div class="pt-title">'+curV.name+' \u2014 Paytable</div>';
html+='<div class="pt-info">'+curV.lines+' Paylines \u2022 RTP '+curV.rtp+' \u2022 '+curV.vol+' Volatility \u2022 Max Win '+curV.mx+'</div>';
html+='<div class="pt-grid">';
curV.syms.forEach(function(s){
html+='<div class="pt-sym"><img src="'+SIMG[s.k]+'" width="48" height="48">';
html+='<div class="pt-name">'+(s.label||s.k.toUpperCase())+'</div>';
if(s.type==='wild')html+='<div class="pt-role">Substitutes all except Scatter</div>';
else if(s.type==='scatter')html+='<div class="pt-role">3+ anywhere = '+curV.freeSpins+' Free Spins</div>';
else{html+='<div class="pt-pays">';
for(var i=2;i<5;i++){if(s.p[i]>0)html+='<span>'+(i+1)+'x: <em>'+s.p[i]+'x</em></span>';}
html+='</div>';}
html+='</div>';});
html+='</div>';
html+='<div class="pt-lines"><div class="pt-title" style="font-size:14px;margin-top:10px">Paylines</div>';
for(var i=0;i<curV.lines;i++){html+='<span class="pt-line" style="color:'+PL_COLORS[i]+'">Line '+(i+1)+'</span>';}
html+='</div>';
el('ptContent').innerHTML=html;
}

/* REELS */
function buildReels(){var e=el('reels');e.innerHTML='';rD=[];
for(var c=0;c<RC;c++){var rl=document.createElement('div');rl.className='rl';rl.id='rl'+c;
var st=document.createElement('div');st.className='strip';st.id='st'+c;var d=[];
for(var i=0;i<SL;i++){var s=wS();d.push(s);var sy=document.createElement('div');sy.className='sym g-'+s.k;sy.id='sy'+c+'_'+i;
sy.innerHTML='<img src="'+SIMG[s.k]+'">'+(s.type==='wild'?'<span class="sym-label wild-label">WILD</span>':s.type==='scatter'?'<span class="sym-label scatter-label">SCATTER</span>':'');
st.appendChild(sy);}
rD.push(d);rl.appendChild(st);e.appendChild(rl);st.style.transform='translateY(-'+SH+'px)';}
buildPaytable();}
function cB(dir){if(busy)return;sndClick();bi=Math.max(0,Math.min(BETS.length-1,bi+dir));bet=BETS[bi];el('bD').textContent=fmt(bet);hlB('bbx');}
function mxB(){if(busy)return;sndClick();bi=BETS.length-1;while(BETS[bi]>bal&&bi>0)bi--;bet=BETS[bi];el('bD').textContent=fmt(bet);}
function uB(){el('blD').textContent=fmt(bal);}

async function doSpin(){if(busy||(!freeSpinsLeft&&bet>bal))return;updateFairBar();busy=true;
if(freeSpinsLeft>0){freeSpinsLeft--;el('freeTag').textContent='FREE SPINS: '+freeSpinsLeft;if(freeSpinsLeft<=0)el('freeTag').style.display='none';}
else{bal-=bet;uB();}
spn++;totalWin=0;cascLvl=0;
el('sD').textContent=spn;el('wD').textContent='-';
el('msg').textContent=freeSpinsLeft>0?'\u2728 Free Spin! \u2728':'\u{1F340} Spinning... \u{1F340}';el('msg').className='msg';
el('spB').disabled=true;el('cns').innerHTML='';
el('mac').className='mac';el('ofl').className='ofl';el('won').className='won';el('multiBadge').className='multi-badge';
document.querySelectorAll('.rl').forEach(function(r){r.className='rl';});
document.querySelectorAll('.sym').forEach(function(s){s.classList.remove('wsym','pop');});
sndSpin();
for(var c=0;c<RC;c++){var st=el('st'+c);var syms=st.querySelectorAll('.sym');var d=[];
for(var i=0;i<SL;i++){var s=wS();d.push(s);syms[i].className='sym g-'+s.k;syms[i].id='sy'+c+'_'+i;
syms[i].innerHTML='<img src="'+SIMG[s.k]+'">'+(s.type==='wild'?'<span class="sym-label wild-label">WILD</span>':s.type==='scatter'?'<span class="sym-label scatter-label">SCATTER</span>':'');}rD[c]=d;}
var stops=await getStops();var done=0;
for(var c=0;c<RC;c++){var tgt=stops[c];
(function(cc,tg){var dur=1500+cc*550;
spinR(cc,dur,tg,function(){el('rl'+cc).classList.add('stop');sndStop();
setTimeout(function(){el('rl'+cc).classList.remove('stop');},300);
done++;if(done===RC)setTimeout(function(){onReelsDone(stops);},400);});})(c,tgt);}}

function spinR(c,dur,stop,cb){var st=el('st'+c);var lp=SL*SH;var t0=performance.now();
var totalDist=lp*(12+c*5)+stop*SH;
function tick(now){var t=(now-t0)/dur;if(t>1)t=1;
var e=1-Math.pow(1-t,3.5);
st.style.transform='translateY('+(-(e*totalDist)%lp)+'px)';
if(t<1){requestAnimationFrame(tick);}else{st.style.transform='translateY('+(-stop*SH)+'px)';cb();}}
requestAnimationFrame(tick);}

/* AFTER REELS STOP */
function onReelsDone(stops){
grid=getGrid(stops);
if(curV.mode==='cascade'){doCascadeCheck(stops);return;}
var res=calcWins(grid,curV);
var multi=freeMulti;
var win=Math.floor(res.totalWin*multi);
// Highlight winning symbols
for(var key in res.allPos){var p=key.split('_');
var sy=el('sy'+p[1]+'_'+((stops[parseInt(p[1])]+parseInt(p[0]))%SL));
if(sy)sy.classList.add('wsym');}
// Check scatters
if(res.scatters.cnt>=3&&curV.freeSpins>0){
freeSpinsLeft+=curV.freeSpins;if(freeSpinsLeft>10)freeSpinsLeft=10;freeMulti=1;
el('freeTag').textContent='FREE SPINS: '+freeSpinsLeft;el('freeTag').style.display='block';
sndFreeSpin();
addChat('sys','','\u2728 '+res.scatters.cnt+' SCATTERS! '+curV.freeSpins+' Free Spins awarded!'+(freeSpinsLeft>=10?' (MAX)':''));
for(var p=0;p<res.scatters.positions.length;p++){
var sp=res.scatters.positions[p];
var sy=el('sy'+sp.c+'_'+((stops[sp.c]+sp.r)%SL));if(sy)sy.classList.add('wsym');}
}
if(win>0){
curV._respinCount=0;
bal+=win;uB();el('wD').textContent=fmt(win);hlB('wbx');
var lineCount=res.results.length;
el('msg').innerHTML=lineCount+' line'+(lineCount>1?'s':'')+' \u2014 <b>+'+fmt(win)+' GP</b>'+(multi>1?' (x'+multi+')':'');
var tier=win>=bet*30?'mega':win>=bet*8?'bigw':'nice';
triggerWinFX(tier,win);
addChat('win','You','Won '+fmt(win)+' GP on '+lineCount+' lines!');
}else if(res.scatters.cnt<3){
// Diamond Rush respin: 2-match on any line = free respin (max 3 respins per spin)
if(curV.mode==='respin'&&(!curV._respinCount||curV._respinCount<3)){
var has2match=false;
var lines2=PAYLINES.slice(0,curV.lines);
for(var li2=0;li2<lines2.length;li2++){
var w2=checkPaylineWin(grid,lines2[li2],curV.wildK);
if(w2.cnt===2&&w2.sym){has2match=true;break;}}
if(has2match){curV._respinCount=(curV._respinCount||0)+1;
el('msg').textContent='\u{1F504} 2-Match! Free Respin ('+curV._respinCount+'/3)';el('msg').className='msg';
busy=false;setTimeout(doSpin,1200);return;}}
curV._respinCount=0;
el('msg').textContent='No luck this time';el('msg').className='msg dim';sndNoWin();}
finishSpin(win>0||res.scatters.cnt>=3);
}

/* CASCADE CHECK */
function doCascadeCheck(stops){
if(cascLvl>=10){if(totalWin>0){var tier='mega';triggerWinFX(tier,totalWin);el('wns').textContent=cascLvl+' cascades!';addChat('win','You','Cascade x'+cascLvl+' — '+fmt(totalWin)+' GP!');}else{el('msg').textContent='No luck this time';el('msg').className='msg dim';}finishSpin(totalWin>0);return;}
var res=calcWins(grid,curV);
if(res.totalWin>0){
cascLvl++;
el('multiBadge').textContent='x'+cascLvl;el('multiBadge').className='multi-badge show';
sndCascade();
var multi=Math.min(cascLvl,3);var win=Math.floor(res.totalWin*multi);
totalWin+=win;bal+=win;uB();
el('wD').textContent=fmt(totalWin);hlB('wbx');
el('msg').textContent='Chain '+cascLvl+': +'+fmt(win)+' GP (x'+multi+')';
for(var key in res.allPos){var p=key.split('_');
var sy=el('sy'+p[1]+'_'+((stops[parseInt(p[1])]+parseInt(p[0]))%SL));if(sy)sy.classList.add('wsym');}
mkC(5+cascLvl*3);
// Replace winning symbols and respin
setTimeout(function(){
for(var c=0;c<RC;c++){var st2=el('st'+c);var syms=st2.querySelectorAll('.sym');var d=[];
for(var i=0;i<SL;i++){var s=wS();d.push(s);syms[i].className='sym g-'+s.k;syms[i].id='sy'+c+'_'+i;
syms[i].innerHTML='<img src="'+SIMG[s.k]+'">'+(s.type==='wild'?'<span class="sym-label wild-label">WILD</span>':'');}rD[c]=d;}
var newS=[];var d3=0;
for(var c=0;c<RC;c++){var tg=3+Math.floor(Math.random()*(SL-ROWS-4));newS.push(tg);
(function(cc,tg2){spinR(cc,800+cc*250,tg2,function(){el('rl'+cc).classList.add('stop');sndStop();
setTimeout(function(){el('rl'+cc).classList.remove('stop');},250);
d3++;if(d3===RC)setTimeout(function(){grid=getGrid(newS);doCascadeCheck(newS);},350);});})(c,tg);}
},1000);
}else{
if(totalWin>0){
var tier=cascLvl>=3||totalWin>=bet*20?'mega':cascLvl>=2||totalWin>=bet*8?'bigw':'nice';
triggerWinFX(tier,totalWin);
el('wns').textContent=cascLvl+' cascades!';
addChat('win','You','Cascade x'+cascLvl+' \u2014 '+fmt(totalWin)+' GP!');
}else{el('msg').textContent='No luck this time';el('msg').className='msg dim';sndNoWin();}
finishSpin(totalWin>0);
}
}

/* WIN EFFECTS */
function triggerWinFX(tier,win){
var w=el('won');var wnl=el('wnl');wnl.innerHTML='';
var text=tier==='mega'?'MEGA WIN!':tier==='bigw'?'BIG WIN!':'NICE!';
for(var i=0;i<text.length;i++){var s=document.createElement('span');s.className='won-letter';s.textContent=text[i];s.style.animationDelay=(i*0.06)+'s';wnl.appendChild(s);}
el('wna').textContent='+'+fmt(win)+' GP';
el('wns').textContent='';
if(tier==='mega'){w.className='won mega show';el('mac').className='mac shk2';el('ofl').className='ofl on2 ofm';el('starburst').className='star-burst rainbow go';mkC(50);sndMegaWin();}
else if(tier==='bigw'){w.className='won bigw show';el('mac').className='mac shk';el('ofl').className='ofl on2 ofd';el('starburst').className='star-burst gold go';mkC(25);sndBigWin();}
else{w.className='won nice show';el('ofl').className='ofl on ofg';el('starburst').className='star-burst green go';mkC(10);sndNice();}
setTimeout(function(){w.classList.add('float');},800);
setTimeout(function(){w.classList.remove('float');w.classList.add('out');},3000);
setTimeout(function(){w.className='won';el('starburst').className='star-burst';},3500);
}
function finishSpin(hasWin){setTimeout(function(){
busy=false;el('spB').disabled=false;el('mac').className='mac';el('ofl').className='ofl';
document.querySelectorAll('.rl').forEach(function(r){r.className='rl';});
if(freeSpinsLeft>0)setTimeout(doSpin,800);
else{freeMulti=1;}
},hasWin?3800:600);}

/* CHAT */
var NAMES=['xLucky777','GreenGoblin','DiamondDave','SlotKing99','CherryBomb','LeprechaunLad','ReelMaster','GoldRush42','SpinQueen','JackpotJoe'];
var MSGS=['nice hit!','gl everyone','cmon big money','lets gooo','machine is hot','need wilds','one more spin','feeling lucky','free spins plz'];

if(type==='sys'){d.className='cmsg sys';d.textContent=text;}

},4000+Math.random()*3000);
setInterval(function(){el('chatOnline').textContent=(10+Math.floor(Math.random()*8))+' online';},10000);}

on('chatSend','click',sendMsg);

on('spB','click',function(){doSpin();buildPaytable();});
on('bm','click',function(){cB(-1);});

// Provably Fair Bar
var fairHash = '';
function genHash(){
  var arr = new Uint8Array(32);
  if(window.crypto)crypto.getRandomValues(arr);
  else for(var i=0;i<32;i++)arr[i]=Math.floor(Math.random()*256);
  return Array.from(arr).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
function updateFairBar(){
  fairHash = genHash();
  var el = document.getElementById('slFairHash');
  if(el) el.textContent = fairHash;
}

fairBar.className = 'sl-fair-bar';
fairBar.innerHTML = '<div class="fl"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm4 8H8v-1c0-1.33 2.67-2 4-2s4 .67 4 2v1z"/></svg>Provably Fair</div><div class="fh" id="slFairHash">generating...</div><button class="fv" id="slFairVerify">Verify</button>';

// Insert after the controls
var slZ = document.querySelector('.S .Z');
if(slZ) slZ.appendChild(fairBar);

updateFairBar();

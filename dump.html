<!DOCTYPE html>
<html>
<head>
<title>RuneLuck — Layout Dump</title>
<style>
body{background:#0a0c10;color:#eee;font-family:monospace;padding:30px;font-size:14px}
pre{background:#1a1d24;padding:16px;border:1px solid #444;max-height:400px;overflow:auto}
.ok{color:#4ade80}.err{color:#ef4444}.info{color:#d4a843}
button{background:#d4a843;color:#0a0c10;border:none;padding:10px 20px;font-size:14px;font-weight:bold;cursor:pointer;margin:6px}
</style>
</head>
<body>
<h2>RuneLuck localStorage dump</h2>
<div id="status">Reading...</div>
<pre id="out"></pre>
<button onclick="doSave()">Save to layouts/current.json</button>
<a href="/"><button>Back to game</button></a>
<script>
var data = null;
try {
  var raw = localStorage.getItem('runeluck_layout');
  if(!raw){
    document.getElementById('status').innerHTML = '<span class="err">localStorage key "runeluck_layout" is empty or missing.</span>';
  } else {
    data = JSON.parse(raw);
    document.getElementById('status').innerHTML = '<span class="ok">Found '+data.length+' items in localStorage.</span>';
    document.getElementById('out').textContent = JSON.stringify(data, null, 2);
  }
} catch(e){
  document.getElementById('status').innerHTML = '<span class="err">Error: '+e.message+'</span>';
}
function doSave(){
  if(!data){ alert('No data to save'); return; }
  fetch('/api/save-layout', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  }).then(function(r){ return r.json(); }).then(function(j){
    document.getElementById('status').innerHTML = '<span class="ok">Saved '+j.count+' items to layouts/current.json</span>';
  }).catch(function(e){
    document.getElementById('status').innerHTML = '<span class="err">Save failed: '+e.message+'</span>';
  });
}
</script>
</body>
</html>

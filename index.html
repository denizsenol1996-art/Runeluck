<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>3DC - 3D Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
</head><body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><span class="lg">3</span><span class="lw">DC</span></div>
    <div class="login-sub">Sign in to play</div>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="username" maxlength="24">
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" maxlength="64">
    <button class="login-btn" id="loginBtn">LOG IN / SIGN UP</button>
    <div class="login-divider"><span>or</span></div>
    <button class="login-discord" id="loginDiscord">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19.27 5.33C17.94 4.71 16.5 4.26 15 4a.09.09 0 0 0-.07.03c-.18.33-.39.76-.53 1.09a16.09 16.09 0 0 0-4.8 0c-.14-.34-.35-.76-.54-1.09c-.01-.02-.04-.03-.07-.03c-1.5.26-2.93.71-4.27 1.33c-.01 0-.02.01-.03.02c-2.72 4.07-3.47 8.03-3.1 11.95c0 .02.01.04.03.05c1.8 1.32 3.53 2.12 5.24 2.65c.03.01.06 0 .07-.02c.4-.55.76-1.13 1.07-1.74c.02-.04 0-.08-.04-.09c-.57-.22-1.11-.48-1.64-.78c-.04-.02-.04-.08-.01-.11c.11-.08.22-.17.33-.25c.02-.02.05-.02.07-.01c3.44 1.57 7.15 1.57 10.55 0c.02-.01.05 0 .07.01c.11.09.22.17.33.26c.04.03.04.09-.01.11c-.52.31-1.07.56-1.64.78c-.04.01-.05.06-.04.09c.32.61.68 1.19 1.07 1.74c.03.01.06.02.09.01c1.72-.53 3.45-1.33 5.25-2.65c.02-.01.03-.03.03-.05c.44-4.53-.73-8.46-3.1-11.95c-.01-.01-.02-.02-.04-.02M8.52 14.91c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.84 2.12-1.89 2.12m6.97 0c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.83 2.12-1.89 2.12"/></svg>
      <span>Login with Discord</span>
    </button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint">First time? Just pick a username and password — your account is created automatically.</div>
  </div>
</div>

<!-- Loading -->
<div class="loader" id="loader">
  <h1><span class="lg">3</span><span class="lw">DC</span></h1>
  <div class="bar"><div class="fill" id="lbar"></div></div>
  <div class="txt" id="ltxt">Building casino...</div>
</div>

<!-- HUD -->
<div class="hud top-bar">
  <div class="logo"><span class="lg">3</span><span class="lw">DC</span></div>
  <div class="bal"><span class="bc"></span><span class="bv" id="gpDisplay">100.0M</span><span style="font-size:9px;color:#444">GP</span></div>
</div>

<div class="hud bottom-bar">
  <button class="gbtn active">🏛 LOBBY</button>
  <button class="gbtn">🎰 SLOTS</button>
  <button class="gbtn">🎡 ROULETTE</button>
  <button class="gbtn">🃏 BLACKJACK</button>
  <button class="gbtn" onclick="RL.crash.open()">📈 CRASH</button>
  <button class="gbtn" onclick="RL.build.toggle()" id="buildBtn">🔨 BUILD</button>
  <button class="dbtn" onclick="window.open('https://discord.gg/runeluck')">💬 DISCORD</button>
</div>

<div class="hud controls">Left-click to walk · Click machine to play · Right-drag to orbit · Scroll to zoom · B = Build</div>

<!-- Interaction prompt -->
<div class="interact-prompt" id="interactPrompt">
  <span id="interactText">Click to play</span>
</div>

<!-- Game UI overlay -->
<div class="game-overlay" id="gameOverlay">
  <div class="game-box">
    <button class="game-close" onclick="RL.games.close()">✕</button>
    <h2 id="gameTitle"></h2>
    <div class="game-desc" id="gameDesc"></div>
    <canvas id="gameCanvas" width="580" height="340"></canvas>
    <div class="game-controls" id="gameControls"></div>
    <div class="game-result" id="gameResult"></div>
  </div>
</div>

<!-- Build panel (content generated by build.js) -->
<div class="build-panel" id="buildPanel"></div>

<!-- Chat box -->
<div id="chatBox" class="chat-box">
  <div id="chatLog" class="chat-log"></div>
  <input type="text" id="chatInput" class="chat-input" placeholder="Press Enter to chat..." maxlength="200">
</div>

<!-- Run toggle (OSRS-style) -->
<div id="runToggle" class="run-toggle" title="Toggle Run" onclick="RL.running=!RL.running;this.classList.toggle('active',RL.running)">
  <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="6" r="3"/>
    <path d="M20 10 L15 14 L10 12 L8 16 L12 17 L15 15 L18 17 L16 22 L10 26 L12 28 L18 24 L22 19 L26 22 L28 18 L24 16 L22 13 Z"/>
  </svg>
</div>

<!-- Compass (OSRS-style, everything clipped inside circle) -->
<div id="compass" class="compass" title="Compass">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="compassClip"><circle cx="50" cy="50" r="42"/></clipPath>
    </defs>
    <circle cx="50" cy="50" r="46" fill="#0c1018" stroke="#d4a843" stroke-width="3"/>
    <circle cx="50" cy="50" r="42" fill="#1a1d24"/>
    <g clip-path="url(#compassClip)">
      <g id="compassRot">
        <polygon points="50,14 58,50 42,50" fill="#ff3030"/>
        <polygon points="50,86 58,50 42,50" fill="#555555"/>
        <circle cx="50" cy="50" r="4" fill="#d4a843"/>
      </g>
    </g>
  </svg>
</div>

<!-- Load all modules -->
<script src="js/main.js"></script>
<script src="js/environment.js"></script>
<script src="js/furniture.js"></script>
<script src="js/npcs.js"></script>
<script src="js/character.js"></script>
<script src="js/character-creation.js"></script>
<script src="js/decorations.js"></script>
<script src="js/build.js"></script>
<script src="js/context-menu.js"></script>
<script src="js/games.js"></script>
<script src="js/slots-game.js"></script>
<script src="js/roulette-game.js"></script>
<script src="js/blackjack-game.js"></script>
<script src="js/mines-game.js"></script>
<script src="js/flower-poker-game.js"></script>
<script src="js/dice-game.js"></script>
<script src="js/crash-game.js"></script>
<script src="js/plinko-game.js"></script>
<script src="js/hotcold-game.js"></script>
<script src="js/osrs-ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/multiplayer.js"></script>
<script>RL.auth.init(function(){ RL.init(); });</script>
</body></html>
